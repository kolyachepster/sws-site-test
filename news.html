<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости - SWS</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        .news-header {
            background: linear-gradient(135deg, #ae0000, #000000);
            padding: 40px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .news-header h1 {
            color: white;
            margin-bottom: 10px;
        }
        
        .news-header p {
            color: rgba(255,255,255,0.8);
        }
        
        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .news-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .news-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        
        .news-content {
            padding: 25px;
        }
        
        .news-date {
            display: inline-block;
            background: linear-gradient(135deg, #ae0000, #000000);
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        
        .news-title {
            font-size: 24px;
            color: #ae0000;
            margin: 0 0 15px 0;
            line-height: 1.3;
        }
        
        .news-category {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 10px;
            margin-bottom: 15px;
        }
        
        .news-excerpt {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .news-full {
            color: #333;
            line-height: 1.7;
            margin-bottom: 20px;
            display: none;
        }
        
        .news-full.show {
            display: block;
        }
        
        .read-more-btn {
            background: none;
            border: 2px solid #ae0000;
            color: #ae0000;
            padding: 8px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .read-more-btn:hover {
            background: #ae0000;
            color: white;
        }
        
        .news-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #999;
        }
        
        .filter-section {
            background: linear-gradient(135deg, #f8f9ff, #ffffff);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .filter-title {
            font-size: 16px;
            font-weight: bold;
            color: #ae0000;
            margin-bottom: 15px;
        }
        
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #ae0000;
            background: white;
            color: #ae0000;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #ae0000;
            color: white;
        }
        
        .search-news {
            margin-bottom: 20px;
        }
        
        .search-news input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-news input:focus {
            border-color: #ae0000;
        }
        
        .no-news {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ae0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .news-image { height: 200px; }
            .news-title { font-size: 20px; }
            .news-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🏠 Главная</a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🎭 Состав</a>
            <a href="news.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">📰 Новости</a>
            <a href="profile.html" class="nav-button" id="navProfileBtn" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">👤 Профиль</a>
        </div>
        
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <form action="search.html" method="get" style="display: flex; width: 100%; max-width: 500px; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Поиск по тайтлам и дабберам..." 
                       style="flex: 1; padding: 12px 20px; border: 2px solid #ae0000; border-radius: 50px; font-size: 16px; outline: none;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>
    
    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип SWS" class="avatar" width="240" height="240" onerror="this.src='https://via.placeholder.com/240/ae0000/ffffff?text=SWS'">
            </a>
            <h1 class="title">Новости</h1>
            <hr>
        </div>
        
        <div class="news-header">
            <h1>📰 Новости студии SWS</h1>
            <p>Все последние новости, анонсы и обновления</p>
        </div>
        
        <div class="content-box">
            <div class="filter-section">
                <div class="filter-title">📂 Категории:</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-category="all">Все новости</button>
                    <button class="filter-btn" data-category="announcement">🎬 Анонсы</button>
                    <button class="filter-btn" data-category="update">🔄 Обновления</button>
                    <button class="filter-btn" data-category="event">🎉 События</button>
                    <button class="filter-btn" data-category="recruitment">🔊 Набор</button>
                </div>
            </div>
            
            <div class="search-news">
                <input type="text" id="searchNewsInput" placeholder="🔍 Поиск по новостям..." autocomplete="off">
            </div>
            
            <div id="newsContainer" class="news-grid">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
    
    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 15px;">
            <a href="index.html" style="color: #ae0000; text-decoration: none;">Главная</a>
            <a href="titles.html" style="color: #ae0000; text-decoration: none;">Тайтлы</a>
            <a href="sostav.html" style="color: #ae0000; text-decoration: none;">Состав</a>
            <a href="privacy.html" style="color: #ae0000; text-decoration: none;">Политика</a>
        </div>
        <p style="font-size: 14px; color: #666;">© 2026 SWS - Sound Wave Studio. Все права защищены.</p>
    </div>

    <script type="module">
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        let currentCategory = 'all';
        let currentSearchQuery = '';
        let allNews = [];
        
        const db = window.firebase?.db;
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }
        
        function getCategoryName(category) {
            const categories = {
                'announcement': '🎬 Анонс',
                'update': '🔄 Обновление',
                'event': '🎉 Событие',
                'recruitment': '🔊 Набор'
            };
            return categories[category] || '📰 Новость';
        }
        
        async function loadNews() {
            if (!db) return [];
            const snap = await getDocs(query(collection(db, "news"), orderBy("date", "desc")));
            const news = [];
            snap.forEach(doc => {
                news.push({ id: doc.id, ...doc.data() });
            });
            return news;
        }
        
        function filterNews() {
            let filtered = [...allNews];
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(news => news.category === currentCategory);
            }
            
            if (currentSearchQuery) {
                const query = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(news => 
                    news.title?.toLowerCase().includes(query) || 
                    news.excerpt?.toLowerCase().includes(query) ||
                    news.content?.toLowerCase().includes(query)
                );
            }
            
            return filtered;
        }
        
        function displayNews() {
            const container = document.getElementById('newsContainer');
            const filteredNews = filterNews();
            
            if (filteredNews.length === 0) {
                container.innerHTML = `
                    <div class="no-news">
                        <h3>😕 Новости не найдены</h3>
                        <p>По вашему запросу ничего не найдено</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredNews.map(news => `
                <div class="news-card" data-id="${news.id}">
                    <img src="${news.image}" alt="${news.title}" class="news-image" onerror="this.src='https://via.placeholder.com/800x400/ae0000/ffffff?text=SWS+News'">
                    <div class="news-content">
                        <div class="news-date">📅 ${formatDate(news.date)}</div>
                        <div class="news-category">${getCategoryName(news.category)}</div>
                        <h2 class="news-title">${escapeHtml(news.title)}</h2>
                        <div class="news-excerpt">${escapeHtml(news.excerpt)}</div>
                        <div class="news-full" id="full-${news.id}">${news.content}</div>
                        <button class="read-more-btn" onclick="toggleNews('${news.id}')">Читать далее</button>
                        <div class="news-meta">
                            <span>👤 ${escapeHtml(news.author)}</span>
                            <span>👁️ ${news.views || 0} просмотров</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleNews(id) {
            const fullContent = document.getElementById(`full-${id}`);
            const btn = document.querySelector(`.news-card[data-id="${id}"] .read-more-btn`);
            
            if (fullContent.classList.contains('show')) {
                fullContent.classList.remove('show');
                btn.textContent = 'Читать далее';
            } else {
                fullContent.classList.add('show');
                btn.textContent = 'Свернуть';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function init() {
            allNews = await loadNews();
            displayNews();
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    displayNews();
                });
            });
            
            document.getElementById('searchNewsInput').addEventListener('input', (e) => {
                currentSearchQuery = e.target.value;
                displayNews();
            });
        }
        
        window.toggleNews = toggleNews;
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
