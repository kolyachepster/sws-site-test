<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Тайтл - SWS</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        .anime-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .anime-poster {
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .anime-info {
            flex: 1;
            min-width: 300px;
        }
        
        .anime-title {
            font-size: 32px;
            color: #ae0000;
            margin: 0 0 10px 0;
        }
        
        .anime-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .anime-tag {
            background: #ae0000;
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .anime-description {
            background: rgba(0,0,0,0.02);
            padding: 20px;
            border-radius: 10px;
            line-height: 1.6;
        }
        
        .player-container {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin: 30px 0;
            aspect-ratio: 16/9;
            width: 100%;
        }
        
        .skip-button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: 2px solid #ffaa00;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .skip-button:hover {
            background: #ffaa00;
            color: black;
        }
        
        .episodes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .episode-item {
            width: 80px;
            text-align: center;
        }
        
        .episode-button {
            width: 100%;
            padding: 8px 0;
            background: linear-gradient(135deg, #ae0000, #000000);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .episode-button:hover:not(.disabled) {
            transform: scale(1.05);
        }
        
        .episode-button.active {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        
        .episode-button.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #666;
        }
        
        .episode-title-small {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
        }
        
        .characters-section {
            margin-top: 40px;
        }
        
        .characters-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        
        .character-card {
            width: 180px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
        }
        
        .character-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .character-name {
            font-size: 16px;
            font-weight: bold;
            color: #ae0000;
            margin: 10px 0 5px;
        }
        
        .character-va {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .character-va-link {
            color: #ae0000;
            text-decoration: none;
        }
        
        .season-section {
            margin-top: 30px;
            margin-bottom: 20px;
        }
        
        .season-title {
            color: #ae0000;
            border-left: 5px solid #000000;
            padding-left: 15px;
            font-size: 22px;
            margin-bottom: 15px;
        }
        
        .not-found {
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ae0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🏠 Главная</a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🎭 Состав</a>
            <a href="news.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">📰 Новости</a>
        </div>
        
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <form action="search.html" method="get" style="display: flex; width: 100%; max-width: 500px; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Поиск по тайтлам и дабберам..." 
                       style="flex: 1; padding: 12px 20px; border: 2px solid #ae0000; border-radius: 50px; font-size: 16px; outline: none;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип SWS" class="avatar" width="240" height="240" onerror="this.src='https://via.placeholder.com/240/ae0000/ffffff?text=SWS'">
            </a>
            <hr>
        </div>
        
        <div class="content-box" id="title-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Загрузка тайтла...</p>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 15px;">
            <a href="index.html" style="color: #ae0000; text-decoration: none;">Главная</a>
            <a href="titles.html" style="color: #ae0000; text-decoration: none;">Тайтлы</a>
            <a href="sostav.html" style="color: #ae0000; text-decoration: none;">Состав</a>
            <a href="privacy.html" style="color: #ae0000; text-decoration: none;">Политика конфиденциальности</a>
        </div>
        <p style="font-size: 14px; color: #666;">© 2026 SWS - Sound Wave Studio. Все права защищены.</p>
    </div>

    <script>
        let currentEpisode = 1;
        let currentTitle = null;
        
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        function getTitleById(id) {
            return window.titlesDatabase.find(title => title.id === id);
        }
        
        function groupEpisodesBySeason(episodes, episodesPerSeason = 25) {
            const seasons = {};
            episodes.forEach(episode => {
                const seasonNum = Math.ceil(episode.number / episodesPerSeason);
                if (!seasons[seasonNum]) seasons[seasonNum] = [];
                seasons[seasonNum].push(episode);
            });
            return seasons;
        }
        
        function displayTitlePage() {
            const titleId = getUrlParameter('id');
            
            if (!titleId) {
                document.getElementById('title-content').innerHTML = `
                    <div class="not-found">
                        <h2>😕 Тайтл не указан</h2>
                        <p>В URL отсутствует ID тайтла</p>
                        <a href="titles.html" class="nav-button" style="display: inline-block; margin-top: 20px;">← Вернуться к списку</a>
                    </div>
                `;
                return;
            }
            
            currentTitle = getTitleById(titleId);
            
            if (!currentTitle) {
                document.getElementById('title-content').innerHTML = `
                    <div class="not-found">
                        <h2>😕 Тайтл не найден</h2>
                        <p>Тайтл с ID "${titleId}" не найден</p>
                        <a href="titles.html" class="nav-button" style="display: inline-block; margin-top: 20px;">← Вернуться к списку</a>
                    </div>
                `;
                return;
            }
            
            document.title = `${currentTitle.name} - SWS`;
            
            let statusText = '';
            if (currentTitle.type === 'movie') statusText = '🎬 Фильм';
            else if (currentTitle.type === 'ongoing') statusText = '🔄 Онгоинг';
            else if (currentTitle.type === 'completed') statusText = '✅ Завершён';
            
            const genresHtml = currentTitle.genres ? currentTitle.genres.map(g => `<span class="anime-tag">${escapeHtml(g)}</span>`).join('') : '';
            
            let episodesHtml = '';
            if (currentTitle.episodes && currentTitle.episodes.length > 0) {
                const episodesPerSeason = currentTitle.type === 'movie' ? 1 : 25;
                const seasons = groupEpisodesBySeason(currentTitle.episodes, episodesPerSeason);
                
                for (let seasonNum in seasons) {
                    episodesHtml += `<div class="season-section"><h3 class="season-title">🎬 Сезон ${seasonNum}</h3><div class="episodes-list">`;
                    seasons[seasonNum].forEach(episode => {
                        const isAvailable = episode.isAvailable === true;
                        const disabledClass = !isAvailable ? 'disabled' : '';
                        const onclickAttr = isAvailable ? `onclick="playEpisode(${episode.number}, '${episode.videoUrl}')"` : '';
                        episodesHtml += `
                            <div class="episode-item">
                                <button class="episode-button ${disabledClass}" ${onclickAttr} data-episode="${episode.number}">${episode.number}</button>
                                ${episode.title ? `<div class="episode-title-small">${escapeHtml(episode.title)}</div>` : ''}
                            </div>
                        `;
                    });
                    episodesHtml += `</div></div>`;
                }
            } else {
                episodesHtml = '<p>Список серий скоро появится...</p>';
            }
            
            let charactersHtml = '';
            if (currentTitle.characters && currentTitle.characters.length > 0) {
                charactersHtml = '<h2>🎭 Персонажи и озвучка</h2><div class="characters-grid">';
                currentTitle.characters.forEach(character => {
                    charactersHtml += `
                        <div class="character-card">
                            <img src="${character.image || 'https://via.placeholder.com/180x150/ae0000/ffffff?text=' + encodeURIComponent(character.name)}" alt="${escapeHtml(character.name)}" class="character-image">
                            <div class="character-name">${escapeHtml(character.name)}</div>
                            <p class="character-va">Озвучивает: <a href="voice.html?id=${character.voiceId}" class="character-va-link">${escapeHtml(character.voiceName)}</a></p>
                        </div>
                    `;
                });
                charactersHtml += '</div>';
            }
            
            const firstAvailableEpisode = currentTitle.episodes?.find(e => e.isAvailable === true);
            const defaultVideoUrl = firstAvailableEpisode ? firstAvailableEpisode.videoUrl : (currentTitle.videoUrl || '');
            
            document.getElementById('title-content').innerHTML = `
                <div class="anime-header">
                    <img src="${currentTitle.poster || currentTitle.image}" alt="${currentTitle.name}" class="anime-poster" onerror="this.src='https://via.placeholder.com/250x350/ae0000/ffffff?text=${encodeURIComponent(currentTitle.name)}'">
                    <div class="anime-info">
                        <h1 class="anime-title">${escapeHtml(currentTitle.name)}</h1>
                        <div class="anime-meta">
                            <span class="anime-tag">${statusText}</span>
                            <span class="anime-tag">📅 ${currentTitle.year}</span>
                            <span class="anime-tag">📺 ${currentTitle.episodes_count} серий</span>
                            <span class="anime-tag">⭐ ${currentTitle.rating}</span>
                        </div>
                        <div class="anime-meta">${genresHtml}</div>
                        <div class="anime-description"><p>${escapeHtml(currentTitle.description || 'Описание скоро появится...')}</p></div>
                    </div>
                </div>
                
                <h2>Смотреть онлайн <span id="current-episode-label" style="font-size: 16px; color: #666;"></span></h2>
                <div class="player-container"><iframe id="video-iframe" src="${defaultVideoUrl}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
                <div id="skip-container" style="text-align: right; display: none;"><button class="skip-button" id="skip-button">⏭️ Skip Opening</button></div>
                
                <h2>📺 Список серий</h2>
                ${episodesHtml}
                ${charactersHtml}
            `;
            
            const episodeParam = getUrlParameter('episode');
            if (episodeParam && currentTitle.episodes) {
                const episodeNum = parseInt(episodeParam);
                const episode = currentTitle.episodes.find(e => e.number === episodeNum);
                if (episode && episode.isAvailable === true) {
                    playEpisode(episodeNum, episode.videoUrl);
                }
            } else if (firstAvailableEpisode) {
                playEpisode(firstAvailableEpisode.number, firstAvailableEpisode.videoUrl);
            }
            
            const skipBtn = document.getElementById('skip-button');
            if (skipBtn) skipBtn.addEventListener('click', () => alert('Функция Skip появится позже!'));
        }
        
        function playEpisode(episodeNumber, videoUrl) {
            const iframe = document.getElementById('video-iframe');
            if (iframe && videoUrl) iframe.src = videoUrl;
            
            currentEpisode = episodeNumber;
            const episodeLabel = document.getElementById('current-episode-label');
            if (episodeLabel) episodeLabel.textContent = `(Серия ${episodeNumber})`;
            
            document.querySelectorAll('.episode-button').forEach(btn => btn.classList.remove('active'));
            const activeButton = document.querySelector(`.episode-button[onclick*="playEpisode(${episodeNumber},"]`);
            if (activeButton) activeButton.classList.add('active');
            
            if (currentTitle && currentTitle.episodes) {
                const episode = currentTitle.episodes.find(e => e.number === episodeNumber);
                const skipContainer = document.getElementById('skip-container');
                if (episode && episode.hasSkip) {
                    skipContainer.style.display = 'block';
                    const skipBtn = document.getElementById('skip-button');
                    if (skipBtn) skipBtn.textContent = `⏭️ ${episode.skipText || 'Skip Opening'}`;
                } else {
                    skipContainer.style.display = 'none';
                }
            }
            
            history.pushState({ episode: episodeNumber }, '', `?id=${currentTitle.id}&episode=${episodeNumber}`);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', displayTitlePage);
        } else {
            displayTitlePage();
        }
    </script>
</body>
</html>
