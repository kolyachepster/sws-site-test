<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - SWS</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        :root {
            --bg: #0b0b0d;
            --card-bg: #141417;
            --input-bg: #050506;
            --accent: #ff2e2e;
            --text: #ffffff;
            --text-dim: #9ca3af;
            --border: #252529;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }
        
        .navigation-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 20px 0;
            flex-wrap: wrap;
        }
        
        .nav-button {
            background: linear-gradient(135deg, #ae0000 0%, #000000 100%);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-button:hover {
            transform: scale(1.05);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ae0000;
        }
        
        .title {
            color: #ae0000;
            font-size: 32px;
            margin: 20px 0;
        }
        
        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }
        
        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            height: fit-content;
        }
        
        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ae0000;
            margin-bottom: 15px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .stat-val {
            display: block;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
        }
        
        .stat-lab {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .ach-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .badge {
            background: #1a1a1f;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge.gold {
            border-color: #ffca28;
            color: #ffca28;
        }
        
        .info-block {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 12px;
        }
        
        .btn-admin {
            background: #3897f0;
        }
        
        .btn-logout {
            background: #222;
            margin-top: 20px;
            width: 100%;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
            outline: none;
        }
        
        hr {
            border-color: var(--border);
            margin: 20px 0;
        }
        
        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ae0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-container {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
        }
        
        .error-container h2 {
            color: #ff4444;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button">🏠 Главная</a>
            <a href="titles.html" class="nav-button">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button">🎭 Состав</a>
            <a href="news.html" class="nav-button">📰 Новости</a>
            <a href="profile.html" class="nav-button" id="navProfileBtn">👤 Профиль</a>
        </div>
        
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <form action="search.html" method="get" style="display: flex; width: 100%; max-width: 500px; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Поиск по тайтлам и дабберам..." 
                       style="flex: 1; padding: 12px 20px; border: 2px solid #ae0000; border-radius: 50px; font-size: 16px; outline: none; background: #1a1a1f; color: white;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>
    
    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип SWS" class="avatar" onerror="this.src='https://via.placeholder.com/120/ae0000/ffffff?text=SWS'">
            </a>
            <h1 class="title">Мой профиль</h1>
            <hr>
        </div>
        
        <div class="content-box" id="profileContent">
            <div style="text-align: center; padding: 50px;">
                <div class="loading-spinner"></div>
                <p>Загрузка профиля...</p>
            </div>
        </div>
    </div>
    
    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 15px;">
            <a href="index.html" style="color: #ae0000; text-decoration: none;">Главная</a>
            <a href="titles.html" style="color: #ae0000; text-decoration: none;">Тайтлы</a>
            <a href="sostav.html" style="color: #ae0000; text-decoration: none;">Состав</a>
            <a href="privacy.html" style="color: #ae0000; text-decoration: none;">Политика</a>
        </div>
        <p style="font-size: 14px; color: #666;">© 2026 SWS - Sound Wave Studio. Все права защищены.</p>
    </div>
    
    <script type="module">
        const profileContent = document.getElementById('profileContent');
        
        async function loadProfile() {
            const user = window.firebase?.getCurrentUser();
            
            if (!user) {
                profileContent.innerHTML = `
                    <div class="error-container">
                        <h2>🔐 Требуется авторизация</h2>
                        <p style="margin: 20px 0;">Войдите в свой аккаунт, чтобы просмотреть профиль</p>
                        <a href="login.html" class="btn" style="display: inline-block; text-decoration: none;">Войти</a>
                        <a href="index.html" class="btn" style="display: inline-block; text-decoration: none; background: #222; margin-left: 10px;">На главную</a>
                    </div>
                `;
                return;
            }
            
            // Проверяем подтверждение email
            if (!user.emailVerified) {
                profileContent.innerHTML = `
                    <div class="error-container">
                        <h2>📧 Email не подтверждён</h2>
                        <p style="margin: 20px 0;">Пожалуйста, подтвердите свой email, перейдя по ссылке в письме, которое было отправлено при регистрации.</p>
                        <p style="margin: 10px 0; color: #ffaa00;">Не получили письмо? Проверьте папку "Спам" или нажмите кнопку ниже.</p>
                        <button id="resendEmailBtn" class="btn" style="background: #ffaa00; color: #ae0000;">Отправить письмо повторно</button>
                        <a href="login.html" class="btn" style="display: inline-block; text-decoration: none; background: #222; margin-left: 10px;">Выйти</a>
                    </div>
                `;
                
                document.getElementById('resendEmailBtn')?.addEventListener('click', async () => {
                    await user.sendEmailVerification();
                    alert('Письмо для подтверждения отправлено! Проверьте почту.');
                });
                return;
            }
            
            const userData = await window.firebase.getUserData(user.uid);
            const isAdmin = userData?.role === 'admin';
            
            profileContent.innerHTML = `
                <div class="profile-layout">
                    <aside class="sidebar">
                        <img src="${userData?.avatar || `https://api.dicebear.com/7.x/notionists-neutral/svg?seed=${userData?.nickname || user.email}`}" class="profile-avatar" onerror="this.src='https://via.placeholder.com/130/ae0000/ffffff'">
                        <h2 id="u-nick">${escapeHtml(userData?.nickname || user.email?.split('@')[0])}</h2>
                        <p style="color: var(--accent); font-size: 11px; font-weight: 800; margin-bottom: 20px;">${isAdmin ? "ГЛАВНЫЙ АДМИНИСТРАТОР" : "УЧАСТНИК СООБЩЕСТВА"}</p>
                        
                        <div class="stat-grid">
                            <div class="stat-card">
                                <span class="stat-val">${userData?.views || 0}</span>
                                <span class="stat-lab">Проектов</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-val">${userData?.regDate || "--"}</span>
                                <span class="stat-lab">Рег.</span>
                            </div>
                        </div>
                        
                        <div class="ach-list">
                            ${isAdmin ? '<span class="badge gold">🛡️ Основатель</span>' : ''}
                            ${userData?.achievements?.map(a => `<span class="badge">${escapeHtml(a)}</span>`).join('') || ''}
                        </div>
                        
                        <button class="btn btn-logout" id="btn-logout">Выход</button>
                    </aside>
                    
                    <div class="main-content">
                        <div class="info-block">
                            <h3 style="margin-bottom:20px">Настройки профиля</h3>
                            <input type="text" id="set-nick" placeholder="Никнейм" value="${escapeHtml(userData?.nickname || '')}">
                            <input type="text" id="set-ava" placeholder="URL аватара" value="${escapeHtml(userData?.avatar || '')}">
                            <button class="btn" id="save-profile">Сохранить изменения</button>
                        </div>
                        
                        ${isAdmin ? `
                        <div id="admin-panel" class="info-block" style="border-color: #3897f0;">
                            <h3 style="color: #3897f0; margin-bottom: 20px;">🛠️ Консоль Администратора</h3>
                            
                            <div style="background: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                                <h4 style="margin-bottom:10px">🎖️ Выдать достижение</h4>
                                <input type="text" id="ach-user-email" placeholder="Email пользователя">
                                <select id="ach-select">
                                    <option value="🚀 Первооткрыватель">🚀 Первооткрыватель</option>
                                    <option value="💎 Спонсор Проекта">💎 Спонсор Проекта</option>
                                    <option value="🎙️ Золотой Голос">🎙️ Золотой Голос</option>
                                    <option value="CUSTOM">-- Своё достижение --</option>
                                </select>
                                <input type="text" id="ach-custom" placeholder="Текст своего достижения" style="display:none">
                                <button class="btn btn-admin" id="btn-give-ach">Выдать ачивку</button>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div>
                                    <h4>➕ Добавить тайтл</h4>
                                    <input type="text" id="t-name" placeholder="Название">
                                    <input type="text" id="t-img" placeholder="URL обложки">
                                    <input type="text" id="t-link" placeholder="Ссылка на видео">
                                    <button class="btn btn-admin" id="add-title">Добавить</button>
                                </div>
                                <div>
                                    <h4>➕ Добавить в команду</h4>
                                    <input type="text" id="m-name" placeholder="Никнейм">
                                    <input type="text" id="m-role" placeholder="Роль">
                                    <input type="text" id="m-img" placeholder="URL фото">
                                    <button class="btn btn-admin" id="add-member">Добавить</button>
                                </div>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            // Привязываем обработчики
            document.getElementById('save-profile')?.addEventListener('click', async () => {
                const newNick = document.getElementById('set-nick').value;
                const newAvatar = document.getElementById('set-ava').value;
                
                await window.firebase.updateProfile(user.uid, {
                    nickname: newNick,
                    avatar: newAvatar
                });
                alert("Сохранено!");
                loadProfile();
            });
            
            document.getElementById('btn-logout')?.addEventListener('click', async () => {
                await window.firebase.logout();
                window.location.href = 'index.html';
            });
            
            if (isAdmin) {
                document.getElementById('ach-select')?.addEventListener('change', (e) => {
                    document.getElementById('ach-custom').style.display = e.target.value === 'CUSTOM' ? 'block' : 'none';
                });
                
                document.getElementById('btn-give-ach')?.addEventListener('click', async () => {
                    const email = document.getElementById('ach-user-email').value;
                    let ach = document.getElementById('ach-select').value;
                    if (ach === 'CUSTOM') ach = document.getElementById('ach-custom').value;
                    if (!email || !ach) {
                        alert('Заполните все поля');
                        return;
                    }
                    const result = await window.firebase.giveAchievement(email, ach);
                    alert(result.success ? "Достижение выдано!" : result.error);
                    if (result.success) {
                        document.getElementById('ach-user-email').value = '';
                        document.getElementById('ach-custom').value = '';
                    }
                });
                
                document.getElementById('add-title')?.addEventListener('click', async () => {
                    const name = document.getElementById('t-name').value;
                    const image = document.getElementById('t-img').value;
                    const videoUrl = document.getElementById('t-link').value;
                    
                    if (!name || !image || !videoUrl) {
                        alert('Заполните все поля');
                        return;
                    }
                    
                    const result = await window.firebase.addTitle({
                        name: name,
                        name_en: name,
                        image: image,
                        poster: image,
                        type: 'ongoing',
                        year: new Date().getFullYear(),
                        episodes_count: 0,
                        seasons: 1,
                        rating: 0,
                        genres: [],
                        description: 'Описание скоро появится',
                        videoUrl: videoUrl,
                        characters: [],
                        episodes: []
                    });
                    alert(result.success ? "Тайтл добавлен!" : result.error);
                    if (result.success) {
                        document.getElementById('t-name').value = '';
                        document.getElementById('t-img').value = '';
                        document.getElementById('t-link').value = '';
                    }
                });
                
                document.getElementById('add-member')?.addEventListener('click', async () => {
                    const name = document.getElementById('m-name').value;
                    const role = document.getElementById('m-role').value;
                    const image = document.getElementById('m-img').value;
                    
                    if (!name || !role || !image) {
                        alert('Заполните все поля');
                        return;
                    }
                    
                    const result = await window.firebase.addTeamMember({
                        id: name.toLowerCase().replace(/\s/g, '_'),
                        name: name,
                        name_en: name,
                        image: image,
                        status: role,
                        joinDate: new Date().getFullYear().toString(),
                        bio: 'Описание скоро появится',
                        categories: ['main'],
                        social: {}
                    });
                    alert(result.success ? "Участник добавлен!" : result.error);
                    if (result.success) {
                        document.getElementById('m-name').value = '';
                        document.getElementById('m-role').value = '';
                        document.getElementById('m-img').value = '';
                    }
                });
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
