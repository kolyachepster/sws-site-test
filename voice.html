<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Даббер - VAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        .voice-profile {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #f8f9ff, #ffffff);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .voice-avatar-large {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ae0000;
            box-shadow: 0 0 20px rgba(174,0,0,0.3);
        }
        
        .voice-info {
            flex: 1;
            min-width: 300px;
        }
        
        .voice-name {
            font-size: 36px;
            color: #ae0000;
            margin: 0 0 10px 0;
        }
        
        .voice-status {
            display: inline-block;
            background: linear-gradient(135deg, #ae0000, #320063);
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .voice-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .voice-meta-item {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .voice-bio {
            background: white;
            padding: 15px;
            border-radius: 10px;
            line-height: 1.6;
            margin: 15px 0;
            border-left: 4px solid #ffaa00;
        }
        
        .voice-social {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: #e7f3ff;
            color: #ae0000;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .social-link:hover {
            background: #ae0000;
            color: white;
        }
        
        .titles-section {
            margin-top: 40px;
        }
        
        .title-card-voice {
            display: flex;
            gap: 20px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            text-decoration: none;
            color: inherit;
        }
        
        .title-card-voice:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .title-card-voice-image {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .title-card-voice-info {
            flex: 1;
        }
        
        .title-card-voice-name {
            font-size: 20px;
            font-weight: bold;
            color: #ae0000;
            margin-bottom: 5px;
        }
        
        .roles-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .role-badge.main {
            background: #ae0000;
            color: white;
        }
        
        .role-badge.recurring {
            background: #320063;
            color: white;
        }
        
        .role-badge.supporting {
            background: #666;
            color: white;
        }
        
        .role-badge.guest {
            background: #ffaa00;
            color: #ae0000;
        }
        
        .role-character {
            font-weight: bold;
        }
        
        .role-episodes {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .not-found {
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .stats-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .stat-box {
            flex: 1;
            min-width: 120px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #ae0000;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ae0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .category-badges {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .category-main {
            background: #ae0000;
            color: white;
        }
        
        .category-tech {
            background: #320063;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🏠 Главная</a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">🎭 Состав</a>
            <a href="news.html" class="nav-button" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%);">📰 Новости</a>
        </div>
        
        <!-- Поиск -->
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <form action="search.html" method="get" style="display: flex; width: 100%; max-width: 500px; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Поиск по тайтлам и дабберам..." 
                       style="flex: 1; padding: 12px 20px; border: 2px solid #ae0000; border-radius: 50px; font-size: 16px; outline: none;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #ae0000 0%, #000000 100%); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип Вата" class="avatar" width="240" height="240" onerror="this.src='https://via.placeholder.com/240/ae0000/ffffff?text=VAT'">
            </a>
            <hr>
        </div>
        
        <div class="content-box" id="voice-content">
            <!-- Анимация загрузки -->
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Загрузка профиля...</p>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 15px;">
            <a href="index.html" style="color: #ae0000; text-decoration: none;">Главная</a>
            <a href="titles.html" style="color: #ae0000; text-decoration: none;">Тайтлы</a>
            <a href="sostav.html" style="color: #ae0000; text-decoration: none;">Состав</a>
            <a href="privacy.html" style="color: #ae0000; text-decoration: none;">Политика конфиденциальности</a>
        </div>
        <p style="font-size: 14px; color: #666; margin: 5px 0;">
            © 2026 SWS - Sound Wawe Studio. Все права защищены.
        </p>
    </div>

    <script>
        // Функция для получения параметра из URL
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Функция для получения даббера по ID
        function getVoiceById(id) {
            return window.teamDatabase.find(voice => voice.id === id);
        }

        // Функция для получения тайтлов по ID даббера
        function getTitlesByVoiceId(voiceId) {
            if (!window.titlesDatabase) return [];
            
            return window.titlesDatabase.filter(title => 
                title.roles && title.roles.some(role => role.voiceId === voiceId)
            ).map(title => {
                const roles = title.roles.filter(role => role.voiceId === voiceId);
                return { ...title, roles };
            });
        }

        // Функция для получения всех ролей даббера
        function getRolesByVoiceId(voiceId) {
            if (!window.titlesDatabase) return [];
            
            const titles = window.titlesDatabase.filter(title => 
                title.roles && title.roles.some(role => role.voiceId === voiceId)
            );
            
            return titles.flatMap(title => 
                title.roles.filter(role => role.voiceId === voiceId)
            );
        }

        // Функция для отображения категорий даббера
        function getCategoryBadges(categories) {
            if (!categories || categories.length === 0) return '';
            
            let badges = '';
            if (categories.includes('main')) {
                badges += '<span class="category-badge category-main">🌟 Основной состав</span>';
            }
            if (categories.includes('tech')) {
                badges += '<span class="category-badge category-tech">🔧 Тех. персонал</span>';
            }
            
            return badges ? `<div class="category-badges">${badges}</div>` : '';
        }

        // Функция для экранирования HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Функция для отображения страницы даббера
        function displayVoicePage() {
            const voiceId = getUrlParameter('id');
            
            if (!voiceId) {
                document.getElementById('voice-content').innerHTML = `
                    <div class="not-found">
                        <h2>😕 Даббер не указан</h2>
                        <p>В URL отсутствует ID даббера</p>
                        <a href="sostav.html" class="nav-button" style="display: inline-block; margin-top: 20px; background: linear-gradient(135deg, #ae0000 0%, #000000 100%); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none;">
                            ← Вернуться к составу
                        </a>
                    </div>
                `;
                return;
            }
            
            // Ищем даббера по ID
            const voice = getVoiceById(voiceId);
            
            if (!voice) {
                document.getElementById('voice-content').innerHTML = `
                    <div class="not-found">
                        <h2>😕 Даббер не найден</h2>
                        <p>Даббер с ID "${voiceId}" не найден в базе данных</p>
                        <a href="sostav.html" class="nav-button" style="display: inline-block; margin-top: 20px; background: linear-gradient(135deg, #ae0000 0%, #000000 100%); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none;">
                            ← Вернуться к составу
                        </a>
                    </div>
                `;
                return;
            }
            
            // Обновляем заголовок страницы
            document.title = `${voice.name} - VAT`;
            
            // Получаем все тайтлы даббера
            const titles = getTitlesByVoiceId(voice.id);
            
            // Статистика
            const totalTitles = titles.length;
            const totalRoles = getRolesByVoiceId(voice.id).length;
            const mainRoles = titles.reduce((acc, t) => acc + t.roles.filter(r => r.type === 'main').length, 0);
            
            // Формируем HTML для тайтлов
            let titlesHtml = '';
            if (titles.length > 0) {
                titlesHtml = '<h2>🎬 Участие в проектах</h2>';
                
                titles.forEach(title => {
                    const roles = title.roles;
                    
                    let rolesHtml = '';
                    roles.forEach(role => {
                        const roleClass = role.type === 'main' ? 'main' : 
                                         role.type === 'recurring' ? 'recurring' : 
                                         role.type === 'supporting' ? 'supporting' : 'guest';
                        
                        rolesHtml += `
                            <div class="role-badge ${roleClass}">
                                <span class="role-character">${escapeHtml(role.character)}</span>
                                ${role.episodes ? `<span class="role-episodes">(${escapeHtml(role.episodes)})</span>` : ''}
                            </div>
                        `;
                    });
                    
                    titlesHtml += `
                        <a href="${escapeHtml(title.id)}.html" class="title-card-voice">
                            <img src="${escapeHtml(title.image)}" alt="${escapeHtml(title.name)}" class="title-card-voice-image" onerror="this.src='https://via.placeholder.com/80/ae0000/ffffff?text=${encodeURIComponent(title.name.charAt(0))}'">
                            <div class="title-card-voice-info">
                                <div class="title-card-voice-name">${escapeHtml(title.name)}</div>
                                <div style="font-size: 14px; color: #666; margin-bottom: 8px;">
                                    ${title.type === 'movie' ? '🎬 Фильм' : `📺 ${title.seasons} сезона, ${title.episodes} серий`}
                                </div>
                                <div class="roles-list">
                                    ${rolesHtml}
                                </div>
                            </div>
                        </a>
                    `;
                });
            } else {
                titlesHtml = '<p>Пока нет информации об участии в проектах</p>';
            }
            
            // Социальные сети
            let socialHtml = '';
            if (voice.social) {
                if (voice.social.telegram) {
                    const tg = voice.social.telegram.replace('@', '');
                    socialHtml += `<a href="https://t.me/${escapeHtml(tg)}" target="_blank" class="social-link">📱 Telegram: ${escapeHtml(voice.social.telegram)}</a>`;
                }
                if (voice.social.vk) {
                    socialHtml += `<a href="https://vk.com/${escapeHtml(voice.social.vk)}" target="_blank" class="social-link">📘 VK: ${escapeHtml(voice.social.vk)}</a>`;
                }
                if (voice.social.github) {
                    socialHtml += `<a href="https://github.com/${escapeHtml(voice.social.github)}" target="_blank" class="social-link">🐙 GitHub: ${escapeHtml(voice.social.github)}</a>`;
                }
            }
            
            // Полный HTML страницы
            document.getElementById('voice-content').innerHTML = `
                <div class="voice-profile">
                    <img src="${escapeHtml(voice.image)}" alt="${escapeHtml(voice.name)}" class="voice-avatar-large" onerror="this.src='https://via.placeholder.com/200/ae0000/ffffff?text=${encodeURIComponent(voice.name.charAt(0).toUpperCase())}'">
                    <div class="voice-info">
                        <h1 class="voice-name">${escapeHtml(voice.name)}</h1>
                        <span class="voice-status">${escapeHtml(voice.status)}</span>
                        ${getCategoryBadges(voice.categories)}
                        
                        <div class="voice-meta">
                            <span class="voice-meta-item">📅 В команде с ${escapeHtml(voice.joinDate)}</span>
                            <span class="voice-meta-item">🎭 ${totalRoles} ролей</span>
                            <span class="voice-meta-item">🎬 ${totalTitles} проектов</span>
                        </div>
                        
                        ${voice.bio ? `<div class="voice-bio">${escapeHtml(voice.bio)}</div>` : ''}
                        
                        ${socialHtml ? `<div class="voice-social">${socialHtml}</div>` : ''}
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number">${totalTitles}</div>
                        <div class="stat-label">Проектов</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${totalRoles}</div>
                        <div class="stat-label">Всего ролей</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${mainRoles}</div>
                        <div class="stat-label">Главных ролей</div>
                    </div>
                </div>
                
                <div class="titles-section">
                    ${titlesHtml}
                </div>
            `;
        }

        // Запускаем после загрузки
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', displayVoicePage);
        } else {
            displayVoicePage();
        }
    </script>
</body>
</html>
